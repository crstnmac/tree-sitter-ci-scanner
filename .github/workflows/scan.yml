name: Code Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  scan:
    uses: crstnmac/tree-sitter-ci-scanner/.github/workflows/reusable-scan.yml@main
    with:
      scan-path: '.'
      rule-packs: 'javascript-security,javascript-conventions,typescript-safety,python-security,python-conventions'
      rules-version: 'main'
    permissions:
      security-events: write
