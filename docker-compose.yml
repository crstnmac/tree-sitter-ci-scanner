services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    # PG18 tuning
    # io_method=worker  — enables PG18's async I/O framework (thread-based AIO).
    #                     Safe on all platforms. For Linux production, swap to
    #                     io_method=io_uring for even lower latency (kernel ≥5.1).
    # wal_compression   — zstd (available since PG17) cuts WAL volume ~60-70%
    #                     vs the old pglz default, reducing disk I/O and
    #                     streaming replication bandwidth.
    # shared_buffers    — 25% of container RAM is the standard starting point.
    # work_mem          — per-sort/hash allocation; raise if complex queries spill.
    command: >
      postgres
        -c io_method=worker
        -c wal_compression=zstd
        -c shared_buffers=256MB
        -c work_mem=8MB
        -c track_io_timing=on
    environment:
      POSTGRES_DB: scanner
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://scanner:scanner@db:5432/scanner
      PORT: 3000
      # Override these in a .env file or via environment:
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:3000/auth/github/callback}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      # Generate with: openssl rand -hex 64
      COOKIE_SECRET: ${COOKIE_SECRET}
      # Generate with: openssl rand -hex 32
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SESSION_HOURS: ${SESSION_HOURS:-24}
      RUST_LOG: server=info,tower_http=info
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
