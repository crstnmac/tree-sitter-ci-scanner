<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <!-- Wordmark -->
    <div class="text-center mb-8">
      <div class="text-4xl mb-3">🔍</div>
      <h1 class="text-2xl font-bold text-slate-800">Scanner</h1>
      <p class="text-slate-500 mt-1 text-sm">Create your account</p>
    </div>

    <!-- Error banner -->
    {% if let Some(err) = error.as_ref() %}
    <div class="mb-4 flex items-start gap-2 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
      <span class="mt-0.5">⚠</span>
      <span>{{ err }}</span>
    </div>
    {% endif %}

    <!-- Registration form -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-4">
      <form method="post" action="/auth/register" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="username">
            Username
          </label>
          <input
            id="username" type="text" name="username"
            required autofocus autocomplete="username"
            pattern="[A-Za-z0-9\-_]{3,32}"
            title="3–32 characters: letters, numbers, hyphens, underscores"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          <p class="mt-1 text-xs text-slate-400">
            3–32 characters. Letters, numbers, <code>-</code> and <code>_</code> only.
          </p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="password">
            Password
          </label>
          <input
            id="password" type="password" name="password"
            required minlength="8" autocomplete="new-password"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          <p class="mt-1 text-xs text-slate-400">Minimum 8 characters.</p>
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800
                 text-white font-medium py-2.5 rounded-lg text-sm transition-colors">
          Create account
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500">
      Already have an account?
      <a href="/auth/login" class="text-blue-600 hover:underline font-medium">Sign in</a>
    </p>

  </div>
</body>
</html>
