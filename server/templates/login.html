<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <!-- Wordmark -->
    <div class="text-center mb-8">
      <div class="text-4xl mb-3">🔍</div>
      <h1 class="text-2xl font-bold text-slate-800">Scanner</h1>
      <p class="text-slate-500 mt-1 text-sm">Sign in to your dashboard</p>
    </div>

    <!-- Error banner -->
    {% if let Some(err) = error.as_ref() %}
    <div class="mb-4 flex items-start gap-2 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
      <span class="mt-0.5">⚠</span>
      <span>{{ err }}</span>
    </div>
    {% endif %}

    <!-- Username / password form -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-4">
      <form method="post" action="/auth/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="username">
            Username
          </label>
          <input
            id="username" type="text" name="username"
            required autofocus autocomplete="username"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="password">
            Password
          </label>
          <input
            id="password" type="password" name="password"
            required autocomplete="current-password"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800
                 text-white font-medium py-2.5 rounded-lg text-sm transition-colors">
          Sign in
        </button>
      </form>
    </div>

    <!-- Divider -->
    <div class="relative flex items-center mb-4">
      <div class="flex-1 border-t border-slate-200"></div>
      <span class="mx-3 text-xs text-slate-400">or</span>
      <div class="flex-1 border-t border-slate-200"></div>
    </div>

    <!-- GitHub OAuth -->
    <a href="/auth/github"
      class="flex items-center justify-center gap-2 w-full
             bg-slate-800 hover:bg-slate-700 active:bg-slate-900
             text-white font-medium py-2.5 rounded-lg text-sm transition-colors mb-6">
      <svg class="w-4 h-4 shrink-0" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                 -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                 .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                 -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
                 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
                 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
                 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      Continue with GitHub
    </a>

    <p class="text-center text-sm text-slate-500">
      No account?
      <a href="/auth/register" class="text-blue-600 hover:underline font-medium">Create one</a>
    </p>

  </div>
</body>
</html>
