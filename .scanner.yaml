# Scanner Configuration File
# Define custom rules for code scanning

rules:
  # JavaScript rules
  - id: js-no-console-log
    name: No console.log statements
    severity: warning
    language: javascript
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @obj
          property: (property_identifier) @prop
          (#eq? @obj "console")
          (#eq? @prop "log"))
        arguments: (arguments) @args)
    message: "Remove console.log statements before committing code"

  - id: js-no-eval
    name: No eval() usage
    severity: error
    language: javascript
    query: |
      (call_expression
        function: (identifier) @func
        (#eq? @func "eval"))
    message: "Using eval() is dangerous and should be avoided"

