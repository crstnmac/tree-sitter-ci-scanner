  # TypeScript rules
  - id: ts-no-any
    name: Avoid 'any' type
    severity: warning
    language: typescript
    query: |
      (type_annotation
        (predefined_type) @type
        (#eq? @type "any"))
    message: "Avoid using 'any' type - it defeats the purpose of TypeScript"
